name = "cr-vector-pipeline"
main = "src/index.ts"
compatibility_date = "2024-04-05"

[ai]
binding = "AI"

[[vectorize]]
binding = "VECTORIZE"
index_name = "cr-sessions-index"

[[r2_buckets]]
binding = "GIT_PACKS_BUCKET"
bucket_name = "cr-git-repos"

[[d1_databases]]
binding = "DB"
database_name = "cr-sessions"
database_id = "b8e08687-2036-4f95-8374-4cd8934fcacf"

[durable_objects]
bindings = [
  { name = "ROOM_SESSION", class_name = "RoomSession" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RoomSession"]

[vars]
APPWRITE_ENDPOINT = "https://sfo.cloud.appwrite.io/v1"
APPWRITE_PROJECT_ID = "cognitive-resonance"
